# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  gradio-prototype:
    image: magelagua/gradio-prototype
    build:
      context: gradio-prototype
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    depends_on:
      - bff-api
    restart: always

  bff-api:
    image: magelagua/bff-api
    build:
      context: bff-api
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - plantnet-api
      - db-api

  plantnet-api:
    image: magelagua/plantnet-api
    build:
      context: plantnet-api
      dockerfile: Dockerfile
    ports:
      - "8081:8081"

  db-api:
    image: magelagua/db-api
    build:
      context: db-api
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    volumes:
      - dados-flowers:/dados

volumes:
  dados-flowers:
